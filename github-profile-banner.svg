<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.42" stop-color="#0b2340"/>
      <stop offset="0.72" stop-color="#071527"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2f55" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .grid { opacity: .22; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; }
      .pulse2 { animation: pulse 2.4s ease-in-out infinite .8s; }
      .pulse3 { animation: pulse 2.4s ease-in-out infinite 1.4s; }
      .flow { stroke-dasharray: 10 18; animation: flow 4s linear infinite; }
      .scan { animation: scan 3.6s ease-in-out infinite; }
      .walk { animation: walk 7s ease-in-out infinite; transform-origin: center; }
      .bob { animation: bob .7s ease-in-out infinite alternate; }
      .arm { animation: arm 7s ease-in-out infinite; transform-origin: 665px 214px; }
      .code { animation: codefade 3.2s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: .35; }
        50% { opacity: 1; }
      }
      @keyframes flow {
        to { stroke-dashoffset: -112; }
      }
      @keyframes scan {
        0%, 100% { transform: translateY(0); opacity: .2; }
        50% { transform: translateY(86px); opacity: .9; }
      }
      @keyframes walk {
        0%, 18% { transform: translateX(-190px); }
        45%, 58% { transform: translateX(0); }
        82%, 100% { transform: translateX(190px); }
      }
      @keyframes bob {
        from { transform: translateY(0); }
        to { transform: translateY(-4px); }
      }
      @keyframes arm {
        0%, 20% { transform: rotate(-12deg); }
        45%, 60% { transform: rotate(8deg); }
        82%, 100% { transform: rotate(-28deg); }
      }
      @keyframes codefade {
        0%, 100% { opacity: .35; }
        50% { opacity: .95; }
      }
    </style>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <g class="grid">
