    <text x="218" y="58" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="800" letter-spacing="5">PAUL MOSINCAT</text>
    <text x="218" y="91" text-anchor="middle" fill="#93c5fd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2.5">COMPUTER SCIENCE @ ILLINOIS TECH</text>
    <line x1="80" y1="116" x2="356" y2="116" stroke="url(#accent)" stroke-width="2"/>
    <text x="218" y="154" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="3">SYSTEMS • INFRASTRUCTURE</text>
    <text x="218" y="188" text-anchor="middle" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="3">AUTOMATION • DATA</text>
  </g>

  <g transform="translate(900 56)">
